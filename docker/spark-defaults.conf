# Delta Lake configuration
spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog

# Warehouse and metastore
spark.sql.warehouse.dir=/opt/spark/warehouse
spark.driver.extraJavaOptions=-Dderby.system.home=/opt/spark/metastore

# Unity Catalog mock (local catalog)
spark.sql.catalog.my_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.sql.catalog.my_catalog.warehouse=/opt/spark/warehouse/my_catalog
spark.sql.catalog.samples=org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.sql.catalog.samples.warehouse=/opt/spark/warehouse/samples

# Performance settings for local development
spark.sql.shuffle.partitions=8
spark.default.parallelism=4
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true

# Memory settings
spark.driver.memory=2g
spark.executor.memory=2g

# Delta Lake optimizations
spark.databricks.delta.optimizeWrite.enabled=true
spark.databricks.delta.autoCompact.enabled=true

# Enable Spark Connect for remote connections
spark.plugins=org.apache.spark.sql.connect.SparkConnectPlugin
